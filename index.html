<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>爆蛋行动 · 搜打撤</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cellipse cx='16' cy='17' rx='10' ry='13' fill='%23FFC23C'/%3E%3Ccircle cx='12' cy='15' r='1.7' fill='%23161a24'/%3E%3Ccircle cx='20' cy='15' r='1.7' fill='%23161a24'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #0c1822; --ink2: #081119; --panel: #16262f; --panel2: #1e3540;
        --line: rgba(255, 246, 230, 0.12); --line2: rgba(255, 246, 230, 0.22);
        --yolk: #ffc23c; --yolk-deep: #e8961a; --boom: #ff5436; --scan: #4fd9c8;
        --shell: #fff4e2; --muted: #92a7b3;
        --easy: #5fd36a; --norm: #ffc23c; --hard: #ff5436;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--ink2);
        font-family: "Nunito", system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--shell);
        -webkit-font-smoothing: antialiased; }
      #app { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

      body.playing:not(.paused) { cursor: none; }
      body.playing .menu, body.playing .corner { display: none !important; }
      body.paused #crosshair, body.paused #hint, body.paused #slowwalk { display: none; }

      /* ====== 出击大厅（自带背景，菜单时盖住 3D） ====== */
      .corner { position: fixed; top: 18px; right: 20px; z-index: 12; display: flex; align-items: center; gap: 10px; }
      .coin { display: flex; align-items: center; gap: 9px; background: linear-gradient(180deg, rgba(255,194,60,0.16), rgba(255,194,60,0.05));
        border: 1px solid rgba(255,194,60,0.4); border-radius: 999px; padding: 7px 15px 7px 10px;
        font-family: "Space Mono", monospace; font-weight: 700; color: var(--yolk); font-size: 16px; }
      .coin-dot { width: 17px; height: 21px; border-radius: 50%; flex: none;
        background: radial-gradient(circle at 38% 32%, #ffe49a, var(--yolk) 55%, var(--yolk-deep));
        box-shadow: inset 0 -3px 4px rgba(180,110,0,0.5), 0 0 10px rgba(255,194,60,0.5); }
      .icon-btn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--line2);
        background: var(--panel); color: var(--shell); font-size: 19px; cursor: pointer; transition: background 0.12s, transform 0.12s; }
      .icon-btn:hover { background: var(--panel2); transform: translateY(-2px); }

      .menu { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center; overflow: hidden;
        background:
          radial-gradient(135% 70% at 50% 100%, rgba(255,150,40,0.22), transparent 55%),
          radial-gradient(90% 55% at 50% 0%, rgba(79,217,200,0.12), transparent 60%),
          linear-gradient(180deg, #091621 0%, #0c1e28 46%, #123338 100%); }

      /* 背景：星星 + 蛋蛋城市天际线剪影 */
      .stars { position: absolute; inset: 0 0 auto 0; height: 56%; z-index: 1; pointer-events: none; opacity: 0.6; }
      .stars::before { content: ""; position: absolute; inset: 0;
        background-image: radial-gradient(circle, rgba(255,255,255,0.75) 1px, transparent 1.6px);
        background-size: 84px 66px; background-position: 24px 28px; }
      .skyline { position: absolute; left: 0; right: 0; bottom: 0; z-index: 1; height: clamp(150px, 27vh, 250px);
        display: flex; align-items: flex-end; justify-content: center; gap: clamp(5px, 0.8vw, 9px); pointer-events: none; }
      .skyline .b { width: clamp(26px, 4.6vw, 52px); border-radius: 5px 5px 0 0; position: relative; flex: none;
        background: linear-gradient(180deg, #123740 0%, #0a1c24 100%); box-shadow: 0 0 0 1px rgba(79,217,200,0.06); }
      .skyline .b::before { content: ""; position: absolute; inset: 12px 9px 16px 9px;
        background-image: radial-gradient(circle, rgba(255,194,60,0.6) 1.4px, transparent 2px);
        background-size: 13px 17px; opacity: 0.5; }

      /* 前景内容 */
      .fg { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: clamp(16px, 2.6vh, 28px); }
      .eyebrow { font-family: "Bungee", sans-serif; font-size: clamp(13px, 1.8vw, 17px); letter-spacing: 2px; }
      .eyebrow .b { color: var(--boom); } .eyebrow .s { color: var(--shell); opacity: 0.85; }

      .hero { position: relative; display: grid; place-items: center; animation: rise 0.6s cubic-bezier(0.2,0.8,0.2,1) both; }
      .hero::before { content: ""; position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%);
        width: clamp(160px, 26vh, 220px); aspect-ratio: 1; border-radius: 50%;
        border: 2px dashed rgba(79,217,200,0.28); animation: spin 18s linear infinite; }
      .hero-egg { position: relative; width: clamp(96px, 16vh, 138px); aspect-ratio: 84/108;
        border-radius: 50% 50% 48% 48% / 58% 58% 42% 42%;
        background: radial-gradient(circle at 38% 30%, #ffffff, #d8f3ee 40%, #9fe2d8 75%, #6fcabd);
        box-shadow: inset 0 -12px 18px rgba(40,120,110,0.35), 0 14px 26px rgba(0,0,0,0.45);
        animation: bob 3.2s ease-in-out infinite; }
      .hero-egg::before, .hero-egg::after { content: ""; position: absolute; top: 38%; width: 13%; aspect-ratio: 3/4;
        border-radius: 50%; background: #14202a; box-shadow: 0 0 0 3px rgba(79,217,200,0.5); }
      .hero-egg::before { left: 24%; } .hero-egg::after { right: 24%; }
      .hero-pad { width: 56%; height: 16px; margin-top: -4px; border-radius: 50%;
        background: radial-gradient(ellipse at center, rgba(79,217,200,0.45), transparent 70%); }
      .agent-name { font-family: "Space Mono", monospace; font-size: 12px; letter-spacing: 2px; color: var(--scan); text-transform: uppercase; }

      .title { margin: 0; font-family: "Bungee", sans-serif; font-size: clamp(30px, 5.4vw, 54px); line-height: 0.96;
        letter-spacing: 2px; color: var(--shell); text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 12px 26px rgba(0,0,0,0.55); }
      .title .boom { color: var(--boom); }
      .subtitle { margin: 6px 0 0; font-family: "Space Mono", monospace; font-size: clamp(11px, 1.6vw, 14px);
        letter-spacing: 5px; color: var(--scan); text-transform: uppercase; }

      .diff { display: flex; gap: clamp(10px, 1.4vw, 16px); }
      .diff label { cursor: pointer; }
      .diff input { position: absolute; opacity: 0; pointer-events: none; }
      .pill { display: flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 999px;
        background: rgba(16,30,38,0.85); border: 2px solid var(--line); font-weight: 800; font-size: clamp(14px, 1.8vw, 17px);
        transition: transform 0.12s, border-color 0.12s, background 0.12s; }
      .pill .dot { width: 11px; height: 11px; border-radius: 50%; }
      .p-easy .dot { background: var(--easy); } .p-norm .dot { background: var(--norm); } .p-hard .dot { background: var(--hard); }
      .diff label:hover .pill { transform: translateY(-2px); border-color: var(--line2); }
      .p-easy input:checked + .pill { border-color: var(--easy); background: rgba(95,211,106,0.16); }
      .p-norm input:checked + .pill { border-color: var(--norm); background: rgba(255,194,60,0.16); }
      .p-hard input:checked + .pill { border-color: var(--hard); background: rgba(255,84,54,0.16); }

      .deploy-btn { font-family: "Bungee", sans-serif; border: none; border-radius: 16px; cursor: pointer;
        padding: 14px 42px; letter-spacing: 3px; color: var(--ink); font-size: clamp(20px, 3vw, 26px);
        background: linear-gradient(180deg, #ffd864, var(--yolk));
        box-shadow: 0 6px 0 var(--yolk-deep), 0 16px 30px rgba(255,194,60,0.3);
        transition: transform 0.12s, box-shadow 0.12s; animation: rise 0.6s 0.1s both; }
      .deploy-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--yolk-deep), 0 20px 38px rgba(255,194,60,0.45); }
      .deploy-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--yolk-deep); }
      .link { background: none; border: none; color: var(--muted); font-family: "Nunito"; font-weight: 700;
        font-size: 14px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
      .link:hover { color: var(--shell); }

      /* 右下：仓库 + 出击；左下：玩法 */
      .actions { position: fixed; right: 22px; bottom: 22px; z-index: 12; display: flex; align-items: stretch; gap: 12px; }
      .stash-btn { display: flex; align-items: center; justify-content: center; gap: 8px;
        background: var(--panel); border: 1px solid var(--line2); border-radius: 16px; padding: 0 26px; cursor: pointer;
        color: var(--shell); font-family: "Nunito"; font-weight: 800; font-size: 17px;
        box-shadow: 0 6px 0 #081119; transition: background 0.12s, transform 0.12s, box-shadow 0.12s; }
      .stash-btn:hover { background: var(--panel2); transform: translateY(-2px); box-shadow: 0 8px 0 #081119; }
      .stash-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #081119; }
      .stash-btn .ic, .icon-btn .ic { width: 21px; height: 21px; display: block; }
      .icon-btn .ic { fill: currentColor; }
      .stash-btn .ic { fill: none; stroke: currentColor; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .help-link { position: fixed; left: 24px; bottom: 28px; z-index: 12; }
      /* 选难度弹窗 */
      .deploy-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
      .deploy-opt { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 14px; cursor: pointer;
        background: var(--ink); border: 2px solid var(--line); color: var(--shell); font-family: "Nunito"; font-weight: 800;
        font-size: 17px; text-align: left; transition: transform 0.12s, border-color 0.12s, background 0.12s; }
      .deploy-opt .dot { width: 13px; height: 13px; border-radius: 50%; flex: none; }
      .deploy-opt .sub { margin-left: auto; font-family: "Space Mono", monospace; font-size: 12px; color: var(--muted); font-weight: 400; }
      .o-easy .dot { background: var(--easy); } .o-norm .dot { background: var(--norm); } .o-hard .dot { background: var(--hard); }
      .o-easy:hover { border-color: var(--easy); background: rgba(95,211,106,0.12); transform: translateY(-2px); }
      .o-norm:hover { border-color: var(--norm); background: rgba(255,194,60,0.12); transform: translateY(-2px); }
      .o-hard:hover { border-color: var(--hard); background: rgba(255,84,54,0.12); transform: translateY(-2px); }
      /* 选地图弹窗 */
      .map-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
      .map-opt { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; padding: 14px 18px; border-radius: 14px;
        cursor: pointer; background: var(--ink); border: 2px solid var(--line); color: var(--shell); font-family: "Nunito";
        text-align: left; transition: transform 0.12s, border-color 0.12s, background 0.12s; }
      .map-opt:not(.locked):hover { border-color: var(--scan); background: rgba(79,217,200,0.10); transform: translateY(-2px); }
      .map-name { font-weight: 800; font-size: 17px; }
      .map-sub { font-family: "Space Mono", monospace; font-size: 12px; color: var(--muted); }
      .map-opt.locked { opacity: 0.45; cursor: not-allowed; }

      /* ====== 弹窗/暂停 ====== */
      .panel { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
        background: rgba(6, 11, 16, 0.6); backdrop-filter: blur(4px); }
      .panel.hidden, .pause.hidden { display: none; }
      .panel-card { background: var(--panel); border: 1px solid var(--line2); border-radius: 20px; padding: 26px 30px;
        min-width: 300px; max-width: 92vw; box-shadow: 0 30px 70px rgba(0,0,0,0.6); animation: rise 0.22s ease both; }
      .panel-card h2 { margin: 0 0 16px; font-size: 22px; color: var(--yolk); font-family: "Bungee", sans-serif; letter-spacing: 1px; }
      .keys { list-style: none; margin: 0 0 18px; padding: 0; display: flex; flex-direction: column; gap: 10px; font-size: 15px; }
      .keys b { display: inline-block; background: var(--ink); border: 1px solid var(--line2); border-radius: 7px;
        padding: 2px 9px; margin-right: 6px; font-family: "Space Mono", monospace; font-size: 12px; }
      .setting { display: flex; align-items: center; gap: 12px; font-size: 15px; margin-bottom: 18px; }
      .setting input[type="range"] { flex: 1; accent-color: var(--yolk); }
      #sens-val { font-family: "Space Mono", monospace; color: var(--yolk); min-width: 50px; text-align: right; }
      .btn { font-family: "Nunito"; font-weight: 800; border: none; cursor: pointer; border-radius: 12px; padding: 11px 22px; font-size: 15px; transition: transform 0.12s, background 0.12s; }
      .btn-primary { background: var(--yolk); color: var(--ink); box-shadow: 0 5px 0 var(--yolk-deep); }
      .btn-primary:hover { transform: translateY(-2px); }
      .btn-ghost { background: var(--panel2); color: var(--shell); border: 1px solid var(--line2); }
      .btn-ghost:hover { background: #274250; transform: translateY(-2px); }
      .pause { position: fixed; inset: 0; z-index: 15; display: flex; align-items: center; justify-content: center;
        background: rgba(6, 11, 16, 0.75); backdrop-filter: blur(4px); }
      .pause-actions { display: flex; flex-direction: column; gap: 12px; min-width: 240px; margin-top: 4px; }

      /* ====== 游戏内 UI ====== */
      #crosshair, #hint, #freeze, #slowwalk { display: none; }
      body.playing #crosshair { display: block; position: fixed; left: 50%; top: 50%; width: 6px; height: 6px;
        margin: -3px 0 0 -3px; border-radius: 50%; background: rgba(255,255,255,0.92); box-shadow: 0 0 2px 1px rgba(0,0,0,0.6); z-index: 5; pointer-events: none; }
      body.playing #hint { display: block; position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
        background: rgba(8,17,25,0.6); padding: 9px 18px; border-radius: 10px; font-size: 14px; letter-spacing: 1px; z-index: 5; pointer-events: none; user-select: none; }
      #freeze { position: fixed; left: 50%; top: 22px; transform: translateX(-50%); background: rgba(42,168,216,0.85);
        color: #fff; font-family: "Bungee", sans-serif; padding: 8px 22px; border-radius: 10px; font-size: 18px; letter-spacing: 1px; z-index: 6; pointer-events: none; }
      #slowwalk { position: fixed; left: 50%; bottom: 62px; transform: translateX(-50%); background: rgba(18,22,34,0.7);
        color: var(--shell); font-family: "Bungee", sans-serif; padding: 5px 16px; border-radius: 8px; font-size: 13px; letter-spacing: 2px; border: 1px solid var(--line2); z-index: 6; pointer-events: none; }

      @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
      @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
    <script type="module" crossorigin src="./assets/index-CMMR0fI4.js"></script>
  </head>
  <body>
    <canvas id="app"></canvas>

    <div class="corner">
      <div class="coin"><span class="coin-dot"></span><span id="coin">1,240</span></div>
      <button class="icon-btn" id="btn-settings" aria-label="设置"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg></button>
    </div>

    <div class="menu">
      <div class="stars"></div>
      <div class="skyline">
        <span class="b" style="height:42%"></span><span class="b" style="height:68%"></span>
        <span class="b" style="height:54%"></span><span class="b" style="height:88%"></span>
        <span class="b" style="height:60%"></span><span class="b" style="height:100%"></span>
        <span class="b" style="height:72%"></span><span class="b" style="height:50%"></span>
        <span class="b" style="height:80%"></span><span class="b" style="height:58%"></span>
        <span class="b" style="height:46%"></span>
      </div>

      <div class="fg">
        <div class="hero">
          <div class="hero-egg"></div>
          <div class="hero-pad"></div>
          <div class="agent-name">特工 · 侦察蛋</div>
        </div>
        <div>
          <h1 class="title"><span class="boom">爆</span>蛋行动</h1>
          <p class="subtitle">搜 · 打 · 撤</p>
        </div>
      </div>

      <button class="link help-link" id="btn-help">玩法说明</button>
      <div class="actions">
        <button class="stash-btn" id="btn-stash"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>仓库</button>
        <button class="deploy-btn" id="btn-start">出击</button>
      </div>
    </div>

    <div id="panel-help" class="panel hidden">
      <div class="panel-card">
        <h2>怎么玩 · 搜打撤</h2>
        <ul class="keys">
          <li><b>搜</b> 翻箱倒柜找蛋蛋币和装备</li>
          <li><b>打</b> 打掉或躲开坏蛋蛋</li>
          <li><b>撤</b> 跑到撤离点撤离，战利品全归你</li>
          <li><b>死了</b> 这局搜到的就丢了</li>
          <li style="margin-top:6px"><b>WASD</b> 走　<b>空格</b> 跳　<b>Shift</b> 蹲　<b>C</b> 静步</li>
        </ul>
        <button class="btn btn-ghost panel-close">知道了</button>
      </div>
    </div>

    <div id="panel-settings" class="panel hidden">
      <div class="panel-card">
        <h2>设置</h2>
        <label class="setting">鼠标灵敏度
          <input id="sens" type="range" min="0.5" max="2.5" step="0.1" value="1" />
          <span id="sens-val">1.0×</span>
        </label>
        <button class="btn btn-ghost panel-close">完成</button>
      </div>
    </div>

    <div id="panel-map" class="panel hidden">
      <div class="panel-card">
        <h2>选择地图</h2>
        <div class="map-opts">
          <button class="map-opt" data-map="city">
            <span class="map-name">蛋蛋城市</span>
            <span class="map-sub">大城市 · 房子多 · 适合搜刮</span>
          </button>
          <button class="map-opt locked" disabled>
            <span class="map-name">工厂仓库</span>
            <span class="map-sub">敬请期待</span>
          </button>
          <button class="map-opt locked" disabled>
            <span class="map-name">雪地</span>
            <span class="map-sub">敬请期待</span>
          </button>
        </div>
        <button class="btn btn-ghost panel-close">取消</button>
      </div>
    </div>

    <div id="panel-deploy" class="panel hidden">
      <div class="panel-card">
        <h2>选择投放难度</h2>
        <div class="deploy-opts">
          <button class="deploy-opt o-easy" data-diff="easy"><span class="dot"></span>简单<span class="sub">稳赚 · 丢得少</span></button>
          <button class="deploy-opt o-norm" data-diff="norm"><span class="dot"></span>普通<span class="sub">适中</span></button>
          <button class="deploy-opt o-hard" data-diff="hard"><span class="dot"></span>困难<span class="sub">高风险 · 超值</span></button>
        </div>
        <button class="btn btn-ghost panel-close">取消</button>
      </div>
    </div>

    <div id="panel-stash" class="panel hidden">
      <div class="panel-card">
        <h2>蛋窝仓库</h2>
        <p style="color: var(--muted); margin: 0 0 18px; font-size: 15px; max-width: 320px;">
          这里以后能看你的蛋蛋币、装备、卖宝物、买更好的枪和护甲。等做到经济系统就开放～
        </p>
        <button class="btn btn-ghost panel-close">知道了</button>
      </div>
    </div>

    <div id="pause" class="pause hidden">
      <div class="panel-card">
        <h2>暂停</h2>
        <div class="pause-actions">
          <button id="btn-resume" class="btn btn-primary">继续游戏</button>
