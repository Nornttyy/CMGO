<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>爆蛋行动</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif; cursor: none; }
      #app { width: 100vw; height: 100vh; display: block; }
      /* 准星：中间小白点（藏了鼠标也知道瞄哪） */
      #crosshair {
        position: fixed; left: 50%; top: 50%; width: 6px; height: 6px;
        margin: -3px 0 0 -3px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.9); box-shadow: 0 0 2px 1px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }
      #hint {
        position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
        color: #fff; background: rgba(0, 0, 0, 0.45); padding: 10px 18px; border-radius: 10px;
        font-size: 15px; letter-spacing: 1px; pointer-events: none; user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="hint">移动鼠标转头 ｜ WASD 移动 ｜ 空格 跳 ｜ Shift 跑 ｜ Ctrl 蹲</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
