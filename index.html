<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>爆蛋行动</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cellipse cx='16' cy='17' rx='10' ry='13' fill='%23FFC23C'/%3E%3Ccircle cx='12' cy='15' r='1.7' fill='%23161a24'/%3E%3Ccircle cx='20' cy='15' r='1.7' fill='%23161a24'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --yolk: #ffc23c; --yolk-deep: #e8961a;
        --boom: #ff5630; --cool: #36c5f0;
        --shell: #fff6e6; --ink: #161a24;
        --panel: rgba(18, 22, 34, 0.62);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e16;
        font-family: "Nunito", system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--shell); }
      #app { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

      /* 背景上的暖色光 + 暗角，让菜单文字更清楚 */
      #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 1;
        background:
          radial-gradient(120% 90% at 50% 10%, rgba(255, 210, 120, 0.22), transparent 55%),
          linear-gradient(to bottom, rgba(8, 10, 18, 0.12), rgba(8, 10, 18, 0.66)),
          radial-gradient(150% 130% at 50% 50%, transparent 52%, rgba(6, 8, 14, 0.62)); }

      /* 鼠标：菜单/暂停时可见（点按钮），只有正在游戏时隐藏 */
      body.playing:not(.paused) { cursor: none; }
      body.playing #vignette, body.playing .menu { display: none !important; }
      body.paused #crosshair, body.paused #hint { display: none; }

      .menu { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 34px; padding: 24px; text-align: center; }
      .topbar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
        padding: 16px 22px; font-family: "Bungee", sans-serif; font-size: 12px; letter-spacing: 1px; }
      .eyebrow { color: var(--yolk); }
      .version { color: rgba(255, 246, 230, 0.6); }

      .hero { display: flex; flex-direction: column; align-items: center; gap: 6px;
        animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
      .title { margin: 0; font-size: clamp(44px, 9vw, 104px); font-weight: 900; line-height: 0.95;
        letter-spacing: 2px; display: flex; align-items: center; gap: 0.16em;
        text-shadow: 0 6px 0 rgba(0, 0, 0, 0.22), 0 14px 30px rgba(0, 0, 0, 0.45); }
      .title .t1 { color: var(--boom); }
      .title .t2 { color: var(--shell); }
      .title .cross { color: var(--yolk); font-size: 0.5em; opacity: 0.9; }
      .subtitle { margin: 0; font-family: "Bungee", sans-serif; font-size: clamp(13px, 2.4vw, 20px);
        letter-spacing: 0.3em; color: var(--cool); }

      .actions { display: flex; flex-direction: column; gap: 14px; align-items: center;
        animation: rise 0.7s 0.12s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
      .btn { font-family: "Nunito", sans-serif; font-weight: 800; border: none; cursor: pointer;
        border-radius: 14px; transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease; }
      .btn:active { transform: translateY(1px); }
      .btn-primary { background: var(--yolk); color: var(--ink); font-size: clamp(20px, 3.4vw, 28px);
        padding: 16px 54px; letter-spacing: 2px;
        box-shadow: 0 6px 0 var(--yolk-deep), 0 14px 26px rgba(0, 0, 0, 0.4); }
      .btn-primary:hover { transform: translateY(-2px);
        box-shadow: 0 8px 0 var(--yolk-deep), 0 18px 34px rgba(0, 0, 0, 0.5); }
      .btn-row { display: flex; gap: 12px; }
      .btn-ghost { background: rgba(255, 246, 230, 0.08); color: var(--shell); font-size: 16px;
        padding: 11px 24px; border: 2px solid rgba(255, 246, 230, 0.35); }
      .btn-ghost:hover { background: rgba(255, 246, 230, 0.16); border-color: var(--yolk); transform: translateY(-2px); }

      .footer { position: fixed; left: 0; right: 0; bottom: 0; display: flex; align-items: center;
        gap: 14px; padding: 14px 22px; font-size: 12px; color: rgba(255, 246, 230, 0.6); }
      .by { font-family: "Bungee", sans-serif; color: rgba(255, 246, 230, 0.7); }
      .stripe { flex: 1; height: 8px; border-radius: 4px; opacity: 0.8;
        background: repeating-linear-gradient(-45deg, var(--yolk) 0 12px, #161a24 12px 24px); }
      .wip { font-family: "Bungee", sans-serif; color: var(--boom); opacity: 0.85; }

      .panel { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
        background: rgba(6, 8, 14, 0.55); backdrop-filter: blur(3px); }
      .panel.hidden { display: none; }
      .pause { position: fixed; inset: 0; z-index: 15; display: flex; align-items: center; justify-content: center;
        background: rgba(6, 8, 14, 0.72); backdrop-filter: blur(3px); }
      .pause.hidden { display: none; }
      .pause-actions { display: flex; flex-direction: column; gap: 12px; min-width: 230px; margin-top: 4px; }
      .panel-card { background: var(--panel); border: 2px solid rgba(255, 246, 230, 0.18); border-radius: 18px;
        padding: 26px 30px; min-width: 280px; max-width: 90vw; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        animation: rise 0.25s ease both; }
      .panel-card h2 { margin: 0 0 16px; font-size: 24px; color: var(--yolk);
        font-family: "Bungee", sans-serif; letter-spacing: 1px; }
      .keys { list-style: none; margin: 0 0 18px; padding: 0; display: flex; flex-direction: column; gap: 10px; font-size: 16px; }
      .keys b { display: inline-block; background: rgba(255, 246, 230, 0.14); border: 1px solid rgba(255, 246, 230, 0.25);
        border-radius: 7px; padding: 2px 9px; margin-right: 6px; font-family: "Bungee", sans-serif; font-size: 13px; }
      .setting { display: flex; align-items: center; gap: 12px; font-size: 16px; margin-bottom: 18px; }
      .setting input[type="range"] { flex: 1; accent-color: var(--yolk); }
      #sens-val { font-family: "Bungee", sans-serif; color: var(--yolk); min-width: 50px; text-align: right; }

      /* 准星 + 游戏提示：只在游戏中显示 */
      #crosshair, #hint { display: none; }
      body.playing #crosshair { display: block; position: fixed; left: 50%; top: 50%; width: 6px; height: 6px;
        margin: -3px 0 0 -3px; border-radius: 50%; background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 2px 1px rgba(0, 0, 0, 0.6); pointer-events: none; z-index: 5; }
      body.playing #hint { display: block; position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.45); padding: 10px 18px; border-radius: 10px; font-size: 15px;
        letter-spacing: 1px; pointer-events: none; user-select: none; z-index: 5; }
      #freeze { display: none; position: fixed; left: 50%; top: 22px; transform: translateX(-50%);
        background: rgba(42, 168, 216, 0.85); color: #fff; font-family: "Bungee", sans-serif;
        padding: 8px 22px; border-radius: 10px; font-size: 18px; letter-spacing: 1px;
        z-index: 6; pointer-events: none; }

      @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
      @media (max-width: 520px) { .btn-row { flex-direction: column; } }

      /* —— 地图编辑器界面 —— */
      #editor-ui { position: fixed; inset: 0; z-index: 40; pointer-events: none;
        font-family: 'Nunito', system-ui, sans-serif; }
      #editor-ui.hidden { display: none; }
      #ed-top { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; gap: 8px; align-items: center; max-width: 96vw; }
      #ed-palette, #ed-size { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
        background: rgba(12, 24, 34, 0.85); padding: 9px 14px; border-radius: 16px;
        pointer-events: auto; box-shadow: 0 6px 22px rgba(0,0,0,0.3); }
      .ed-title { color: #fff4e2; font-weight: 800; margin-right: 4px; }
      .ed-brush { background: #2b3c49; color: #e9eef2; border: 2px solid transparent;
        border-radius: 11px; padding: 9px 14px; font-size: 15px; font-weight: 800; cursor: pointer; }
      .ed-brush:hover { background: #364b5b; }
      .ed-brush.active { background: #ffc23c; color: #0c1822; border-color: #fff; }
      .ed-grp { color: #fff4e2; font-weight: 800; display: flex; align-items: center; gap: 4px; }
      .ed-mini { background: #2b3c49; color: #e9eef2; border: none; border-radius: 8px;
        padding: 6px 10px; font-size: 15px; font-weight: 800; cursor: pointer; min-width: 30px; }
      .ed-mini.wide { padding: 6px 12px; }
      .ed-mini:hover { background: #4a90d9; }
      #ed-readout { color: #ffc23c; font-weight: 800; font-size: 14px; margin-left: 4px; }
      #ed-actions { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 12px; pointer-events: auto; }
      #ed-actions .btn { width: auto; white-space: nowrap; font-size: 16px; padding: 11px 24px; }
      #ed-hint { position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%);
        color: #0c1822; background: rgba(255, 244, 226, 0.9); padding: 7px 16px; white-space: nowrap;
        border-radius: 11px; font-size: 13px; font-weight: 700; pointer-events: none; }
    </style>
    <script type="module" crossorigin src="./assets/index-xnRrhFd9.js"></script>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="vignette"></div>

    <div class="menu">
      <div class="topbar">
        <span class="eyebrow">卡通战术 · 网页射击</span>
        <span class="version">v0.1 · 里程碑1</span>
      </div>

      <div class="hero">
        <h1 class="title">
          <span class="cross">✛</span><span class="t1">爆</span><span class="t2">蛋行动</span><span class="cross">✛</span>
        </h1>
        <p class="subtitle">OPERATION&nbsp;BOOM-EGG</p>
      </div>

      <nav class="actions">
        <button id="btn-start" class="btn btn-primary">开始游戏</button>
        <div class="btn-row">
          <button id="btn-editor" class="btn btn-ghost">做地图</button>
          <button id="btn-help" class="btn btn-ghost">玩法说明</button>
          <button id="btn-settings" class="btn btn-ghost">设置</button>
        </div>
      </nav>

      <div class="footer">
        <span class="by">by Nornttyy</span>
        <span class="stripe"></span>
        <span class="wip">更多内容开发中…</span>
      </div>
    </div>

    <div id="panel-help" class="panel hidden">
      <div class="panel-card">
        <h2>玩法说明</h2>
        <ul class="keys">
          <li><b>移动鼠标</b> 转头看</li>
          <li><b>W</b><b>A</b><b>S</b><b>D</b> 前后左右移动</li>
          <li><b>空格</b> 跳　<b>Shift</b>/<b>Ctrl</b> 蹲　<b>C</b> 静步（再按取消）</li>
        </ul>
        <button class="btn btn-ghost panel-close">知道了</button>
      </div>
    </div>

    <div id="panel-settings" class="panel hidden">
      <div class="panel-card">
        <h2>设置</h2>
        <label class="setting">鼠标灵敏度
          <input id="sens" type="range" min="0.5" max="2.5" step="0.1" value="1" />
          <span id="sens-val">1.0×</span>
        </label>
        <button class="btn btn-ghost panel-close">完成</button>
      </div>
    </div>

    <div id="pause" class="pause hidden">
      <div class="panel-card">
        <h2>暂停</h2>
        <div class="pause-actions">
          <button id="btn-resume" class="btn btn-primary">继续游戏</button>
          <button id="btn-pause-settings" class="btn btn-ghost">设置</button>
          <button id="btn-tomenu" class="btn btn-ghost">返回主菜单</button>
        </div>
      </div>
    </div>

    <!-- 地图编辑器界面（做地图时显示） -->
    <div id="editor-ui" class="hidden">
      <div id="ed-top">
        <div id="ed-palette">
          <span class="ed-title">放什么：</span>
          <button class="ed-brush active" data-brush="wall">墙</button>
          <button class="ed-brush" data-brush="box">箱子</button>
          <button class="ed-brush" data-brush="house">房子</button>
          <button class="ed-brush" data-brush="barrier">光幕</button>
          <button class="ed-brush" data-brush="A">A点</button>
          <button class="ed-brush" data-brush="B">B点</button>
          <button class="ed-brush" data-brush="spawnT">匪家</button>
          <button class="ed-brush" data-brush="spawnC">警家</button>
          <button class="ed-brush" data-brush="erase">橡皮擦</button>
        </div>
        <div id="ed-size">
          <button id="ed-rot" class="ed-mini wide">旋转 ↻ (R)</button>
          <span class="ed-grp">高 <button class="ed-mini" data-dim="h" data-delta="-1">−</button><button class="ed-mini" data-dim="h" data-delta="1">＋</button></span>
          <span class="ed-grp">长 <button class="ed-mini" data-dim="w" data-delta="-1">−</button><button class="ed-mini" data-dim="w" data-delta="1">＋</button></span>
          <span class="ed-grp">宽 <button class="ed-mini" data-dim="d" data-delta="-1">−</button><button class="ed-mini" data-dim="d" data-delta="1">＋</button></span>
          <span id="ed-readout"></span>
        </div>
      </div>
      <div id="ed-hint">拖动鼠标转视角 ｜ 滚轮放大缩小 ｜ 左键点地面放东西 ｜ 选橡皮擦点掉</div>
      <div id="ed-actions">
        <button id="ed-play" class="btn btn-primary">试玩这张图</button>
        <button id="ed-clear" class="btn btn-ghost">清空</button>
        <button id="ed-back" class="btn btn-ghost">返回</button>
      </div>
    </div>

    <div id="freeze"></div>
    <div id="crosshair"></div>
    <div id="hint">移动鼠标转头 ｜ WASD 移动 ｜ 空格 跳 ｜ Shift/Ctrl 蹲 ｜ C 静步</div>

  </body>
</html>
